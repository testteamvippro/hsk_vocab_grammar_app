<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Mastery | Học Từ Vựng & Ngữ Pháp HSK</title>
    <meta name="description" content="Ứng dụng học từ vựng và ngữ pháp HSK 1-6 miễn phí với pinyin và nghĩa tiếng Việt">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">📚</span>
            <h1 class="nav-title">HSK Mastery</h1>
        </div>
        <div class="nav-stats">
            <span class="stat-badge" id="wordCount">0 từ</span>
        </div>
    </nav>

    <main class="main-content">

        <!-- Hero -->
        <div class="hero-section">
            <div class="hero-chars">
                <span class="hero-char">学</span>
                <span class="hero-char">习</span>
                <span class="hero-char">汉</span>
                <span class="hero-char">语</span>
            </div>
            <p class="hero-subtitle">Học từ vựng &amp; ngữ pháp HSK 1-6 hiệu quả</p>
        </div>

        <div class="app-container">

            <!-- Animated accent bar -->
            <div class="level-accent-bar"></div>

            <!-- Tab Navigation -->
            <div class="tabs">
                <button class="tab-btn active" id="btnVocab">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    Từ Vựng
                </button>
                <button class="tab-btn" id="btnGrammar">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    Ngữ Pháp
                </button>
            </div>

            <!-- Controls -->
            <div class="controls">
                <!-- Level chips -->
                <div class="level-selector">
                    <label class="control-label">Cấp độ</label>
                    <div class="level-chips" id="levelChips">
                        <button class="chip active" data-level="hsk1">HSK 1</button>
                        <button class="chip" data-level="hsk2">HSK 2</button>
                        <button class="chip" data-level="hsk3">HSK 3</button>
                        <button class="chip" data-level="hsk4">HSK 4</button>
                        <button class="chip" data-level="hsk5">HSK 5</button>
                        <button class="chip" data-level="hsk6">HSK 6</button>
                    </div>
                </div>

                <!-- Search + View toggle -->
                <div class="controls-row2">
                    <div class="search-box">
                        <svg class="search-icon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Tìm kiếm từ vựng...">
                        <button class="search-clear" id="searchClear" hidden>&times;</button>
                    </div>

                    <!-- View mode toggle -->
                    <div class="view-toggle" id="viewToggle">
                        <!-- Table view -->
                        <button class="view-btn active" data-view="table" title="Bảng">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                                <line x1="3" y1="9" x2="21" y2="9"/>
                                <line x1="3" y1="15" x2="21" y2="15"/>
                                <line x1="9" y1="9" x2="9" y2="21"/>
                            </svg>
                        </button>
                        <!-- Card view -->
                        <button class="view-btn" data-view="card" title="Thẻ">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                <rect x="3" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="3" width="7" height="7" rx="1"/>
                                <rect x="3" y="14" width="7" height="7" rx="1"/>
                                <rect x="14" y="14" width="7" height="7" rx="1"/>
                            </svg>
                        </button>
                        <!-- Flashcard / study view -->
                        <button class="view-btn" data-view="flash" title="Flashcard">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area" id="contentArea">

                <!-- TABLE VIEW -->
                <div class="table-wrapper" id="tableWrapper">
                    <table>
                        <thead id="tableHeader"></thead>
                        <tbody id="appBody"></tbody>
                    </table>
                </div>

                <!-- CARD VIEW -->
                <div class="card-grid" id="cardGrid" hidden></div>

                <!-- FLASHCARD VIEW -->
                <div class="flashcard-area" id="flashArea" hidden>
                    <div class="flashcard-counter" id="flashCounter">1 / 1</div>
                    <div class="flashcard-progress">
                        <div class="flashcard-progress-fill" id="flashProgressFill" style="width:0%"></div>
                    </div>
                    <div class="flip-card" id="flipCard">
                        <div class="flip-card-inner" id="flipCardInner">
                            <div class="flip-card-front" id="flipFront"></div>
                            <div class="flip-card-back"  id="flipBack"></div>
                        </div>
                    </div>
                    <div class="flashcard-controls">
                        <button class="fc-btn" id="fcPrev">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                            Trước
                        </button>
                        <button class="fc-btn primary" id="fcFlip">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.55"/></svg>
                            Lật thẻ
                        </button>
                        <button class="fc-btn" id="fcNext">
                            Tiếp
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState" hidden>
                    <span class="empty-icon">🔍</span>
                    <p>Không tìm thấy kết quả</p>
                    <small>Thử từ khóa khác</small>
                </div>

            </div>
        </div>
    </main>

    <footer class="footer">
        <p>HSK Mastery &copy; 2024 — Học tiếng Trung miễn phí</p>
    </footer>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
