<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Mastery | Học Từ Vựng & Ngữ Pháp HSK</title>
    <meta name="description" content="Ứng dụng học từ vựng và ngữ pháp HSK 1-6 miễn phí với pinyin và nghĩa tiếng Việt">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">📚</span>
            <h1 class="nav-title">HSK Mastery</h1>
        </div>
        <div class="nav-stats" id="navStats">
            <span class="stat-badge" id="wordCount">0 từ</span>
        </div>
    </nav>

    <main class="main-content">
        <div class="hero-section">
            <p class="hero-subtitle">Học từ vựng & ngữ pháp HSK 1-6 hiệu quả</p>
        </div>

        <div class="app-container">
            <!-- Tab Navigation -->
            <div class="tabs">
                <button class="tab-btn active" id="btnVocab">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    Từ Vựng
                </button>
                <button class="tab-btn" id="btnGrammar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Ngữ Pháp
                </button>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="level-selector">
                    <label class="control-label">Cấp độ</label>
                    <div class="level-chips" id="levelChips">
                        <button class="chip active" data-level="hsk1Old">HSK 1 Old</button>
                        <button class="chip" data-level="hsk1New">HSK 1 New</button>
                        <button class="chip" data-level="hsk2Old">HSK 2 Old</button>
                        <button class="chip" data-level="hsk2New">HSK 2 New</button>
                        <button class="chip" data-level="hsk3Old">HSK 3 Old</button>
                        <button class="chip" data-level="hsk3New">HSK 3 New</button>
                        <button class="chip" data-level="hsk4Old">HSK 4 Old</button>
                        <button class="chip" data-level="hsk4New">HSK 4 New</button>
                        <button class="chip" data-level="hsk5Old">HSK 5 Old</button>
                        <button class="chip" data-level="hsk5New">HSK 5 New</button>
                        <button class="chip" data-level="hsk6Old">HSK 6 Old</button>
                        <button class="chip" data-level="hsk6New">HSK 6 New</button>
                    </div>
                </div>
                <div class="search-box">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Tìm kiếm từ vựng...">
                    <button class="search-clear" id="searchClear" hidden>&times;</button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area">
                <div class="table-wrapper" id="tableWrapper">
                    <table>
                        <thead id="tableHeader"></thead>
                        <tbody id="appBody"></tbody>
                    </table>
                </div>
                <div class="empty-state" id="emptyState" hidden>
                    <span class="empty-icon">🔍</span>
                    <p>Không tìm thấy kết quả</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>HSK Mastery &copy; 2024 — Học tiếng Trung miễn phí</p>
    </footer>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
